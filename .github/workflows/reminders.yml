name: Send loan reminders

# Runs on GitHub's free scheduler so reminders fire even if the backend's
# free hosting tier has gone to sleep — this ping wakes it up and runs the
# reminder check in the same request.
#
# Cron times are in UTC. 30 2 * * * = 8:00am IST. 30 12 * * * = 6:00pm IST.
# Adjust if you're lending outside India / IST.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   BACKEND_URL              e.g. https://khata-backend.onrender.com
#   REMINDER_TRIGGER_SECRET  must match the value set in the backend's env vars

on:
  schedule:
    - cron: "30 2 * * *"   # 8:00am IST — "due tomorrow" + "due today" morning reminder
    - cron: "30 12 * * *"  # 6:00pm IST — "still due today" evening reminder
  workflow_dispatch: {}     # lets you trigger it manually from the Actions tab to test

jobs:
  trigger-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Determine which pass to run
        id: pass
        run: |
          hour_utc=$(date -u +%H)
          if [ "$hour_utc" = "02" ]; then
            echo "pass=morning" >> "$GITHUB_OUTPUT"
          else
            echo "pass=evening" >> "$GITHUB_OUTPUT"
          fi

      - name: Call the reminder endpoint
        run: |
          curl -sS -X POST "${{ secrets.BACKEND_URL }}/api/internal/run-reminders?pass=${{ steps.pass.outputs.pass }}" \
            -H "x-reminder-secret: ${{ secrets.REMINDER_TRIGGER_SECRET }}" \
            --fail-with-body \
            --max-time 90
